name: CI

# Déclenché sur toute PR et sur les pushs vers les branches principales
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Annuler les runs précédents sur la même branche si un nouveau push arrive
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 — Lint backend (ruff : pyflakes + erreurs syntaxiques)
  # ──────────────────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint — Backend (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: ruff check
        working-directory: backend
        run: ruff check .

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 — Tests backend avec couverture
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Tests — Backend (pytest + coverage)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=services.email_notifications \
            --cov=services.cve_utils \
            --cov=services.health_checks \
            --cov=services.validator \
            --cov=services.ssh_scanner \
            --cov=services.inventory \
            --cov=services.install_manager \
            --cov=routers.install_router \
            --cov=auth.router \
            --cov=auth.models \
            --cov=auth.reset_tokens \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=38
        # Seuil de couverture appliqué uniquement sur les modules testés.
        # Sprint coverage SSH/auth/install : périmètre étendu à
        # services.ssh_scanner / services.inventory / services.install_manager /
        # routers.install_router / auth.router / auth.models / auth.reset_tokens.
        # Couverture combinée mesurée ≈ 39% — seuil fixé à 38% comme plancher
        # ("ratchet" anti-régression). Augmenter progressivement au fil des
        # sprints P2 et P3 au fur et à mesure des nouveaux tests.

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-py${{ matrix.python-version }}-${{ github.run_id }}
          path: backend/coverage.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 — Sécurité backend (bandit SAST + pip-audit dépendances)
  # ──────────────────────────────────────────────────────────────────────────
  security-python:
    name: Security — bandit + pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: bandit (SAST Python — rapport complet, sévérité moyenne et plus)
        working-directory: backend
        run: bandit -r . -x ./tests -ll -iii -f json -o bandit-report.json
        continue-on-error: true
        # Rapport informatif (continue-on-error) : la base de code historique
        # contient des findings de sévérité moyenne (subprocess, etc.) déjà
        # couverts par d'autres contrôles. Le step suivant bloque sur les
        # findings de sévérité ET confiance HAUTES.

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.run_id }}
          path: backend/bandit-report.json
          retention-days: 30

      - name: bandit (bloquant — sévérité haute uniquement)
        working-directory: backend
        run: bandit -r . -x ./tests -lll -iii
        # Bloquant : tout finding de sévérité HIGH (avec confiance haute) fait
        # échouer la CI. Pas de continue-on-error ici.

      - name: pip-audit (CVE des dépendances Python — rapport complet)
        working-directory: backend
        run: pip-audit -r requirements.txt --desc -f json -o pip-audit-report.json
        continue-on-error: true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report-${{ github.run_id }}
          path: backend/pip-audit-report.json
          retention-days: 30

      - name: pip-audit (bloquant — toute CVE connue)
        working-directory: backend
        run: pip-audit -r requirements.txt --desc
        # Bloquant : pip-audit ne distingue pas de niveau "high/critical" en
        # CLI — toute CVE connue avec correctif disponible bloque la CI.
        # Les dépendances doivent être tenues à jour (cf. PyJWT/python-dotenv).

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4 — Build Docker (smoke test : les images compilent sans erreur)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build — Docker smoke test
    runs-on: ubuntu-latest
    # On lance le build seulement si lint et tests passent
    needs: [lint-backend, test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker compose -f docker-compose.yaml -f docker-compose.build.yml build backend
        # apt-repo construit lors du release (inclut reprepro / nginx)
        # Le build ici sert uniquement à vérifier que le Dockerfile backend compile.

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5 — Trivy : scan de vulnérabilités des images Docker
  # ──────────────────────────────────────────────────────────────────────────
  security-docker:
    name: Security — Trivy (images Docker)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (tag local pour scan)
        run: docker build -t repod-backend:scan ./backend

      - name: Trivy — scan image backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: repod-backend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: backend/.trivyignore
        # Bloquant sur CRITICAL/HIGH avec correctif disponible (ignore-unfixed).
        # Les CVE triées et acceptées (ex: faux positifs, correctif amont
        # indisponible) doivent être ajoutées à backend/.trivyignore avec un
        # commentaire justificatif et une date de revue.

      - name: Build apt-repo image (tag local pour scan)
        run: docker build -t repod-apt-repo:scan -f Dockerfile .

      - name: Trivy — scan image apt-repo
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: repod-apt-repo:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
        # Voir commentaire ci-dessus (scan backend) — même politique.

  # ──────────────────────────────────────────────────────────────────────────
  # Job 6 — Tests frontend (Vitest, non-bloquant pour l'instant)
  # ──────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Tests — Frontend (Vitest)
    runs-on: ubuntu-latest
    continue-on-error: true   # non bloquant tant que les tests FE ne sont pas stabilisés

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: npm audit (CVE des dépendances frontend)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
        # Non-bloquant : certaines advisories transitives n'ont pas encore de
        # correctif direct. Réévaluer périodiquement.

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests
        env:
          CI: true

      - name: Build (vite build)
        working-directory: frontend
        run: npm run build
