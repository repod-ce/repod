server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de sécurité HTTP ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content-Security-Policy
    # unsafe-inline nécessaire pour Tailwind CSS inline styles (React build)
    # Le nonce-based CSP nécessiterait une réécriture du build React — prévu en v3
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # Taille max des corps de requête (cohérence avec le backend — les .deb peuvent dépasser 500 MB).
    client_max_body_size 512m;

    # ── Compression gzip ──────────────────────────────────────────────────────
    # Désactivée par défaut dans l'image nginx:alpine (`#gzip on;` commenté dans
    # /etc/nginx/nginx.conf, jamais réactivé) — le bundle JS de premier chargement
    # (~1.3 Mo minifié, ~370 Ko une fois compressé) était transféré tel quel,
    # ralentissant sensiblement la toute première page vue (le login), avant que
    # le cache navigateur n'entre en jeu pour les visites suivantes.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/xml+rss application/atom+xml
               image/svg+xml font/woff font/woff2 application/font-woff
               application/vnd.ms-fontobject;

    # ── Reverse-proxy vers le backend FastAPI ─────────────────────────────────
    # Toutes les requêtes /api/ sont transmises au conteneur backend-api (port 8000).
    # resolver 127.0.0.11 : DNS interne Docker Compose, re-résout toutes les 30s
    # pour éviter le cache d'IP périmé après un redémarrage du backend.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream http://backend-api:8000;

    # ── Endpoints infra (non versionnés) ─────────────────────────────────────
    location = /health {
        proxy_pass $backend_upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /health/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /metrics {
        proxy_pass $backend_upstream;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;

        # En-têtes de proxy standard
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support SSE (Server-Sent Events) pour l'import en streaming
        proxy_buffering            off;
        proxy_cache                off;
        chunked_transfer_encoding  on;

        # Timeouts adaptés aux opérations longues (sync d'index, import de paquets)
        proxy_connect_timeout  10s;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;

        # Taille max identique au serveur racine (upload de paquets volumineux)
        client_max_body_size 512m;
    }

    location / {
        try_files $uri /index.html;
        # index.html ne doit jamais être mis en cache — les bundles JS ont des hashes
        # dans leur nom et changent à chaque build. index.html doit toujours être frais.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires 0;
        }
    }

    # Gérer les fichiers dans le dossier static/
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gérer les erreurs 404
    error_page 404 /index.html;

    # Gérer les erreurs 500, 502, 503, 504
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
