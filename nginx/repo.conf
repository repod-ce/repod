server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/repos;
    autoindex off;

    # Expose correctement le dépôt APT avec le bon chemin
    location /repos/ {
        root /usr/share/nginx/html/;
        autoindex off;
    }

    # Dépôt APK Alpine Linux
    # apk add --repository https://repod.example.com/apk/alpine3.20/main
    # → cherche : /apk/alpine3.20/main/x86_64/APKINDEX.tar.gz
    location /apk/ {
        root /usr/share/nginx/html/;
        autoindex off;

        # Pas de mise en cache pour APKINDEX (mis à jour à chaque upload)
        location ~* APKINDEX\.tar\.gz$ {
            root /usr/share/nginx/html/;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Log des téléchargements .apk
        location ~* \.apk$ {
            root /usr/share/nginx/html/;
            access_log /var/log/nginx/downloads.log main;
        }
    }

    # Téléchargements .deb — log dédié pour statistiques
    location ~* \.deb$ {
        root /usr/share/nginx/html/;
        access_log /var/log/nginx/downloads.log main;
    }

    # Téléchargements .rpm
    location ~* \.rpm$ {
        root /usr/share/nginx/html/;
        access_log /var/log/nginx/downloads.log main;
    }

    # Bloquer l'accès aux fichiers internes de reprepro
    location ~ /repos/.*/conf {
        deny all;
    }

    location ~ /repos/.*/db {
        deny all;
    }

    # Idem à la racine (root = /usr/share/nginx/html/repos, donc /conf/ et /db/
    # pointent directement vers les dossiers internes de reprepro)
    location ~ ^/(conf|db)(/|$) {
        deny all;
    }
}
