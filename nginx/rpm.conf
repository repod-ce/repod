##
## Repod — configuration nginx pour dépôt RPM (createrepo_c)
## Utilisé lorsque REPO_FORMAT=rpm (docker-compose.rpm.yml)
##
## Structure des dépôts servis :
##   /repos/<distribution>/<arch>/               → répertoire de paquets
##   /repos/<distribution>/<arch>/repodata/      → métadonnées createrepo_c
##   /repos/pool/<name>-<version>.<arch>.rpm     → pool central
##

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/repos;

    # ── Sécurité de base ─────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Bloquer les accès aux dossiers Git et aux fichiers sensibles
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(sh|py|conf|env)$ {
        deny all;
        return 404;
    }

    # ── Navigation — autoindex activé pour les clients DNF/Zypper ────────────
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # ── Téléchargements .rpm — log dédié pour statistiques ───────────────────
    location ~* \.rpm$ {
        access_log /var/log/nginx/downloads.log main;
        add_header Content-Type "application/x-rpm";
        add_header Cache-Control "no-cache";
    }

    # ── repomd.xml — pas de cache (DNF relit à chaque appel) ─────────────────
    location ~* /repodata/repomd\.xml$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        default_type "application/xml";
    }

    # ── Métadonnées compressées (.gz, .zst) ──────────────────────────────────
    location ~* /repodata/.*\.(gz|zst|xml)$ {
        add_header Cache-Control "max-age=300";
    }

    # ── Fichiers .repo pour DNF/Zypper ───────────────────────────────────────
    location ~* \.repo$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "max-age=3600";
    }

    # ── Clé publique GPG ─────────────────────────────────────────────────────
    location ~* (RPM-GPG-KEY-.*|depot\.gpg|.*\.asc)$ {
        add_header Content-Type "application/pgp-keys";
        add_header Cache-Control "max-age=86400";
    }

    # ── repomd.xml.asc (signature GPG détachée) ──────────────────────────────
    location ~* /repodata/repomd\.xml\.asc$ {
        add_header Content-Type "application/pgp-signature";
        add_header Cache-Control "no-cache";
    }
}
