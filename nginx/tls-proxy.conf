# =============================================================================
# Repod — Reverse proxy TLS
# Fichier : nginx/tls-proxy.conf
#
# Chargé par le service `nginx-proxy` (docker-compose.tls.yml).
# Ne pas monter dans les conteneurs apt-repo / frontend-ui.
#
# Architecture :
#   :80          → redirect 301 vers :443 (sauf /.well-known/acme-challenge/)
#   :443         → UI de gestion (frontend-ui:80) + API (/api/)
#   :8443        → API directe (backend-api:8000) — CI/CD, Prometheus
#
# Paramètres TLS partagés ─────────────────────────────────────────────────────
#   TLS 1.2 / 1.3 uniquement, ciphers AEAD/PFS obligatoires, HSTS max-age 2 ans
# =============================================================================

# ── Session TLS partagée entre les vhosts ────────────────────────────────────
ssl_session_cache   shared:SSL:20m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# DH params — généré par gen-selfsigned-certs.sh ou Let's Encrypt
# Commenté si le fichier n'existe pas (requis seulement pour DHE, rare avec ECDHE)
# ssl_dhparam /certs/dhparam.pem;

# Ciphers recommandés Mozilla "Intermediate" (TLS 1.2 + 1.3, compatibilité max)
ssl_protocols               TLSv1.2 TLSv1.3;
ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers   off;

# OCSP stapling (désactivé pour self-signed — activer avec Let's Encrypt)
# ssl_stapling        on;
# ssl_stapling_verify on;
# ssl_trusted_certificate /certs/chain.pem;
# resolver 8.8.8.8 1.1.1.1 valid=300s;
# resolver_timeout 5s;


# ── 1. HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen      80 default_server;
    server_name _;

    server_tokens off;

    # Validation ACME (Let's Encrypt webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ── 2. Interface de gestion HTTPS (:443) ─────────────────────────────────────
server {
    listen 443 ssl default_server;
    http2  on;
    server_name _;

    server_tokens off;

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    # ── Headers de sécurité ──────────────────────────────────────────────────
    # HSTS — 2 ans, inclut les sous-domaines
    # AVERTISSEMENT : ne pas activer preload sans avoir un domaine public enregistré
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Taille max — cohérence avec le backend (paquets .deb/.rpm volumineux)
    client_max_body_size 512m;

    # ── DNS Docker interne ───────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $frontend_upstream http://frontend-ui:80;

    # ── Proxy général → frontend (qui proxy /api/ → backend) ─────────────────
    location / {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        keep-alive;

        proxy_connect_timeout  10s;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;

        proxy_buffering on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }

    # ── SSE (Server-Sent Events) — upload/stream + logs/stream ───────────────
    # Le proxy doit désactiver le buffering pour que les événements arrivent
    # en temps réel dans le navigateur.
    location ~ ^/api/v1/(upload/stream|logs/stream) {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cache-Control     no-cache;

        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        chunked_transfer_encoding on;
    }

    # ── Endpoint /metrics — transmis au backend (protégé par METRICS_TOKEN) ──
    location = /metrics {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Endpoint /health ─────────────────────────────────────────────────────
    location = /health {
        proxy_pass         $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
    }
}


# ── 3. Accès direct API HTTPS (:8443) ─────────────────────────────────────────
# Pour les clients CI/CD, scripts curl, et Prometheus.
# Ne pas exposer publiquement si Prometheus est interne — restreindre via firewall.
server {
    listen 8443 ssl default_server;
    http2  on;
    server_name _;

    server_tokens off;

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;

    client_max_body_size 512m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream http://backend-api:8000;

    location / {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        keep-alive;

        proxy_connect_timeout  10s;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
    }

    # SSE via API directe
    location ~ ^/api/v1/(upload/stream|logs/stream) {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cache-Control     no-cache;

        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        chunked_transfer_encoding on;
    }
}
